spring.application.name=patent-service

server.port=8080

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/hospitaldb
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

logging.level.root=info

billing.service.address=${BILLING_SERVICE:localhost}
billing.service.grpc.port=${BILLING_SERVICE_PORT:9091}

spring.kafka.bootstrap.server=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

