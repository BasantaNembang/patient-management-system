server:
  port: 4000

spring:
  cloud:
    gateway:
      routes:
        - id: auth-route
          uri: http://auth-service:8083/auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: patient-route
          uri: http://paitent-service:8080/patent
          predicates:
            - Path=/api/patent/**
          filters:
            - StripPrefix=1
            - JwtValidation


auth:
  service:
    url: http://auth-service:8083/auth

